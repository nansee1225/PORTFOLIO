<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Orbit Skills</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: #0f172a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Poppins', sans-serif;
    color: white;
}

/* Container */
.orbit-container {
    position: relative;
    width: 450px;
    height: 450px;
}

/* Center Name */
.center-name {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    font-size: 32px;
    font-weight: 700;

    background: linear-gradient(45deg, #38bdf8, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;

    white-space: nowrap;
    overflow: hidden;
    border-right: 3px solid #a78bfa;

    width: 0;
    animation: typing 3s steps(20) forwards, blink 0.7s infinite;
}

@keyframes typing {
    from { width: 0; }
    to { width: 240px; }
}

@keyframes blink {
    50% { border-color: transparent; }
}

/* Orbit Circle (VISIBLE NOW) */
.orbit {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 350px;
    height: 350px;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    animation: rotate 12s linear infinite;
}

/* Skills */
.skill {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: 0 0;
    font-size: 16px;
}

/* Position skills */
.skill:nth-child(1) { transform: rotate(0deg) translateX(175px); }
.skill:nth-child(2) { transform: rotate(72deg) translateX(175px); }
.skill:nth-child(3) { transform: rotate(144deg) translateX(175px); }
.skill:nth-child(4) { transform: rotate(216deg) translateX(175px); }
.skill:nth-child(5) { transform: rotate(288deg) translateX(175px); }

@keyframes rotate {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
}
</style>

</head>
<body>

<div class="orbit-container">

    <!-- Name -->
    <div class="center-name">
        Nansee Gupta
    </div>

    <!-- Orbit with visible path -->
    <div class="orbit">
        <div class="skill">C/C++</div>
        <div class="skill">Python</div>
        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">SQL</div>
    </div>

</div>

</body>
</html>
